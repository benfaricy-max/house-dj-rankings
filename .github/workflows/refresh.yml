name: Refresh Rankings

on:
  schedule:
    - cron: "12 7 * * *"    # 07:12 UTC = 00:12 Pacific — just after YouTube quota resets at midnight PT
  workflow_dispatch:          # manual trigger from GitHub UI

permissions:
  contents: write             # allows committing rankings.json + artists.json back to repo
  issues: write               # the notify job opens/updates a failure issue (minimum-viable alerting)

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90          # hard backstop: never burn the 6h runner limit again
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install pytrends

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Resolve missing Spotify IDs (new/discovered artists)
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: node resolveSpotifyIds.js
        working-directory: backend
        continue-on-error: true

      - name: Beatport discovery (auto-add strong new chart artists)
        run: node discoverBeatport.js --add
        working-directory: backend
        continue-on-error: true   # roster growth is non-critical

      - name: Generate rankings
        timeout-minutes: 35       # per-step cap; fetches are timeout-bounded so this is slack
        continue-on-error: true   # a bad fetch day must not skip the enrich + commit steps below
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node generateStatic.js
        working-directory: backend

      - name: Beatport chart signal
        run: node enrichBeatport.js
        working-directory: backend
        continue-on-error: true   # never block the refresh if Beatport scrape fails

      - name: Beatport Hype signal (emerging credibility)
        run: node enrichBeatportHype.js
        working-directory: backend
        continue-on-error: true   # leading indicator; same plain-HTTP scrape

      - name: 1001Tracklists DJ-support signal
        run: node enrich1001.js
        working-directory: backend
        continue-on-error: true   # local API by default; no-ops cleanly if TL_API_BASE unreachable
        env:
          TL_API_BASE: ${{ vars.TL_API_BASE }}

      - name: Label & Release Trajectory (full Beatport artist-page release history)
        run: node enrichArtistLabels.js
        working-directory: backend
        timeout-minutes: 25       # ~327 artists × 1-2 plain-HTTP requests; resumable (caches beatport_artist_id)
        continue-on-error: true   # never block the refresh on label sourcing

      - name: Tour density signal (Songkick)
        run: node enrichTour.js
        working-directory: backend
        continue-on-error: true   # never block the refresh if Songkick scrape fails

      - name: Resident Advisor booking signal
        run: node enrichRA.js
        working-directory: backend
        continue-on-error: true   # plain GraphQL, no puppeteer — runs in CI; skip stale (<14d)

      - name: Festival presence signal (Songkick lineups)
        run: node fetchFestivals.js
        working-directory: backend
        continue-on-error: true   # plain HTTP; merge-safe (failed fetch keeps prior lineups). Feeds next generateStatic via computeFestivalScore.

      - name: Reconcile tour reach (fill Songkick gaps from RA)
        run: node reconcileTour.js
        working-directory: backend
        continue-on-error: true   # Songkick under-covers electronic acts; RA is authoritative

      - name: De-noise geographic interest (drop Trends keyword collisions)
        run: node cleanGeoTrends.js
        working-directory: backend
        continue-on-error: true   # idempotent guard; preserves raw in *_raw

      - name: Listener growth signal (kworb)
        run: node enrichKworb.js
        working-directory: backend
        continue-on-error: true

      - name: Wikipedia pageviews signal
        run: node enrichWikipedia.js
        working-directory: backend
        continue-on-error: true

      - name: Backfill artist images (Deezer + Spotify fallback)
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: node enrichImages.js
        working-directory: backend
        continue-on-error: true   # never block the refresh on image lookups

      - name: Recompute booking fees (uses fresh listener data)
        run: node computeFees.js
        working-directory: backend
        continue-on-error: true

      - name: Momentum Score + velocity (after all rate-of-change signals)
        run: node enrichMomentum.js
        working-directory: backend
        continue-on-error: true   # runs after Trends/listener/Wikipedia/Beatport/tour are fresh

      - name: Price/Demand Gap (needs fees + momentum)
        run: node enrichValueGap.js
        working-directory: backend
        continue-on-error: true

      - name: Install Chrome for Puppeteer
        run: npx puppeteer browsers install chrome
        working-directory: backend
        continue-on-error: true   # social-asset rendering is non-critical

      - name: Regenerate social brand assets (uses fresh numbers)
        run: node makeBrandAssets.js
        working-directory: backend
        continue-on-error: true   # never block the refresh on rendering

      - name: Data guard — block a shrunken/wiped index (PERMANENT RULE #1 in CI)
        # Runs from repo root (no working-directory). Compares the freshly built
        # rankings.json against HEAD and FAILS the job — before any commit — if the
        # roster count or file size dropped more than MIN_RETAIN allows. This is the
        # one step that must NOT be continue-on-error: blocking a bad refresh is the
        # whole point.
        run: node backend/ciDataGuard.js

      - name: Commit updated rankings
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/rankings.json backend/artists.json frontend/public/brand backend/beatport-archive.json
          git diff --staged --quiet && { echo "no changes"; exit 0; }
          git commit -m "chore: refresh rankings + cache YouTube channel IDs [skip ci]"
          # Push with rebase-and-retry: if a commit landed on main during the long
          # refresh (concurrent runs / other sessions hit this repo), replay our
          # refresh commit on top of it rather than losing the day's data to a
          # non-fast-forward rejection.
          #
          # The committed files are fully *regenerated* snapshots, so on any content
          # conflict our freshly-built version is authoritative: `-X theirs` makes the
          # commit being replayed (ours) win every conflicting hunk, while still
          # cleanly merging non-overlapping concurrent edits (e.g. a manual roster add
          # to artists.json on different lines). `--autostash` shelves the working
          # tree's *unstaged* changes (the refresh pipeline rewrites many files but we
          # only commit four of them) so the rebase isn't blocked by "you have unstaged
          # changes". Always `--abort` a failed rebase before the next attempt —
          # otherwise an unmerged/detached-HEAD state makes every subsequent attempt
          # fail with "you have unmerged files" and the loop can never recover.
          for i in 1 2 3 4 5; do
            git fetch origin main || true
            git rebase --autostash -X theirs origin/main || { git rebase --abort 2>/dev/null || true; }
            git push && { echo "pushed on attempt $i"; exit 0; }
            echo "push attempt $i failed — retrying"; sleep $((i * 3))
          done
          echo "::error::could not push refreshed data after 5 attempts"; exit 1

  # Minimum-viable Vigil: if the refresh job fails (data guard blocked a wiped
  # index, or the commit/push failed), surface it instead of failing silently.
  # Opens — or comments on an existing open — GitHub issue, and optionally pings
  # Slack. Uses GITHUB_TOKEN only; Slack is opt-in via the SLACK_WEBHOOK_URL secret.
  notify-on-failure:
    needs: refresh
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update the failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const label = "refresh-failure";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "The **Refresh Rankings** workflow failed.",
              "",
              `- Run: ${runUrl}`,
              `- Triggered by: \`${context.eventName}\``,
              `- Commit: ${context.sha}`,
              `- Time (UTC): ${new Date().toISOString()}`,
              "",
              "Most likely the **data guard** blocked a shrunken/wiped index, or the commit/push step failed. Check the run log.",
            ].join("\n");
            // Dedup: comment on an existing open issue rather than spawning one every night.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: label, per_page: 1,
            });
            if (existing.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: "🔴 Refresh Rankings workflow failed", body, labels: [label],
              });
            }

      - name: Slack alert (optional — only if SLACK_WEBHOOK_URL secret is set)
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -fsS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🔴 *Refresh Rankings* failed — ${RUN_URL}\"}" \
            "$SLACK_WEBHOOK_URL" || echo "slack post failed (non-fatal)"
