name: Refresh Rankings

on:
  schedule:
    - cron: "0 8 * * *"     # daily at 8am UTC — after YouTube quota resets (midnight Pacific)
  workflow_dispatch:          # manual trigger from GitHub UI

permissions:
  contents: write             # allows committing rankings.json + artists.json back to repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install pytrends

      - name: Install backend deps
        run: npm install
        working-directory: backend

      - name: Generate rankings
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node generateStatic.js
        working-directory: backend

      - name: Commit updated rankings
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/rankings.json backend/artists.json
          git diff --staged --quiet || git commit -m "chore: refresh rankings + cache YouTube channel IDs [skip ci]"
          git push
